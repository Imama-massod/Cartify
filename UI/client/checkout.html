<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Cartify Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../shared/css/base.css">
    
    <style>
        .checkout-wrapper {
            display: flex;
            gap: 40px;
            margin-top: 50px;
            min-height: 50vh;
        }

        .checkout-form {
            flex: 2;
            background: white;
            padding: 40px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .checkout-form h2 {
            font-size: 1.8rem;
            color: var(--primary-blue);
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #EEE;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #E9ECEF;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary-light);
            background: #F8F9FA;
        }

        .payment-box {
            border: 2px solid var(--primary-blue);
            padding: 20px;
            border-radius: var(--border-radius-md);
            background: rgba(27, 54, 93, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            color: var(--primary-blue);
        }

        /* Order Summary Box */
        .order-summary {
            flex: 1;
            background: #F8F9FA;
            padding: 30px;
            border-radius: var(--border-radius-lg);
            border: 2px solid #E9ECEF;
            align-self: flex-start;
            position: sticky;
            top: 100px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .summary-total {
            border-top: 2px dashed #ccc;
            padding-top: 20px;
            margin-top: 20px;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--primary-blue);
        }

        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- REUSABLE MAIN HEADER -->
    <header class="main-header">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" class="logo-wrapper">
                <img src="../assets/images/logo.png" alt="Cartify Logo">
            </a>
            
        </div>
    </header>

    <div class="container checkout-wrapper">
        <div class="checkout-form">
            <h2>Shipping Information</h2>
            
            <form id="checkoutForm" onsubmit="handleCheckout(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="custName" required placeholder="To whom should we deliver?">
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="custEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="custPhone" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Street Address</label>
                    <textarea id="addrStreet" rows="2" required placeholder="House No, Street, Landmark"></textarea>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="addrCity" required>
                    </div>
                    <div class="form-group">
                        <label>State / Province</label>
                        <input type="text" id="addrState" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Zip / Postal Code</label>
                    <input type="text" id="addrPin" required style="width: 50%;">
                </div>

                <h2 style="margin-top: 50px;">Payment Method</h2>
                
                <div class="payment-box">
                    <input type="radio" checked style="width:20px; height:20px;" name="payment">
                    <span><i class="fa fa-money-bill-wave"></i> Cash on Delivery (COD)</span>
                </div>
                <!-- Extend with Stripe/PayPal later -->

                <div class="form-group" style="margin-top: 30px;">
                    <label>Special Instructions (Optional)</label>
                    <textarea id="notes" rows="2" placeholder="Leave at the front door..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary" id="btnPlaceOrder" style="width: 100%; font-size: 1.4rem; padding: 20px; margin-top: 20px;">
                    Place Order Now <i class="fa fa-check"></i>
                </button>
            </form>
        </div>

        <aside class="order-summary">
            <h3 style="margin-bottom: 25px; color: var(--primary-blue);">Cart Summary</h3>
            
            <div id="summaryItemsContainer">
                <i class="fa fa-spinner fa-spin"></i> Loading Cart...
            </div>
            
            <div class="summary-row" style="margin-top: 30px;">
                <span>Subtotal</span>
                <span id="txtSub">---</span>
            </div>
            <div class="summary-row">
                <span>Shipping Fee</span>
                <span>Rs 500.00</span>
            </div>
            
            <div class="summary-row summary-total">
                <span>Total to Pay</span>
                <span id="txtTotal">---</span>
            </div>
        </aside>
    </div>

    <!-- Success Output overlay purely generated by JS when order is successful -->
    <div class="success-overlay" id="successScreen" style="display: none;">
        <i class="fa fa-check-circle" style="font-size: 6rem; color: #4CAF50; margin-bottom: 20px;"></i>
        <h1 style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 10px;">Order Placed!</h1>
        <p style="font-size: 1.5rem; color: var(--text-muted); margin-bottom: 30px;">Your Order Number is: <strong id="showOrderNum" style="color: var(--primary-blue);"></strong></p>
        <p style="margin-bottom: 40px;">Thank you for shopping at Cartify. We are preparing your lovely toys for shipment.</p>
        <a href="index.html" class="btn btn-secondary">Return to Babymart Home</a>
    </div>

    <script src="../shared/js/api.js"></script>

    <script>
        const FIXED_SHIPPING = 500.00;
        let finalSubtotal = 0;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('cartify_token');
            const userStr = localStorage.getItem('cartify_user');

            if(!token) {
                alert("You must be logged in to checkout.");
                window.location.href = 'login.html';
                return;
            }

           
            if(userStr) {
                const u = JSON.parse(userStr);
                document.getElementById('custName').value = u.name || '';
                document.getElementById('custEmail').value = u.email || '';
                document.getElementById('custPhone').value = u.phone || '';
            }

            await loadCheckoutCart();
        });

        async function loadCheckoutCart() {
            try {
                const res = await apiFetch('/cart');
                const items = res.data || [];

                if(items.length === 0) {
                    alert("Your cart is empty!");
                    window.location.href = 'shop.html';
                    return;
                }

                let html = '';
                items.forEach(i => {
                    // Effective selling price: flash_sale_price > discount_price > price
                    let price = i.price;
                    if (i.is_flash_sale && i.flash_sale_price) {
                        price = i.flash_sale_price;
                    } else if (i.discount_price) {
                        price = i.discount_price;
                    }
                    finalSubtotal += price * i.quantity;
                    const hasDiscount = price < i.price;
                    const priceLabel = hasDiscount
                        ? `<span style="text-decoration:line-through;color:#aaa;font-size:0.8rem;">Rs ${i.price.toFixed(0)}</span> <span style="color:#e53935;font-weight:900;">Rs ${price.toFixed(0)}</span>`
                        : `Rs ${price.toFixed(0)}`;
                    html += `
                        <div class="summary-item">
                            <span style="flex: 1; padding-right:10px;"><b>${i.quantity}x</b> ${i.name}</span>
                            <span style="font-weight:bold; color:var(--text-main);">${priceLabel} = Rs ${(price * i.quantity).toFixed(0)}</span>
                        </div>
                    `;
                });

                document.getElementById('summaryItemsContainer').innerHTML = html;
                document.getElementById('txtSub').innerText = `Rs ${finalSubtotal.toFixed(0)}`;
                document.getElementById('txtTotal').innerText = `Rs ${(finalSubtotal + FIXED_SHIPPING).toFixed(0)}`;

            } catch(e) {
                document.getElementById('summaryItemsContainer').innerHTML = "<span style='color:red'>Failed to connect to cart.</span>";
            }
        }

        async function handleCheckout(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnPlaceOrder');
            
            const payload = { //server ysni sara data database mein jaye ga  api cll ho kar k                 customer_name: document.getElementById('custName').value,
                customer_email: document.getElementById('custEmail').value,
                customer_phone: document.getElementById('custPhone').value,
                address_street: document.getElementById('addrStreet').value,
                address_city: document.getElementById('addrCity').value,
                address_state: document.getElementById('addrState').value,
                address_pincode: document.getElementById('addrPin').value,
                shipping_charge: FIXED_SHIPPING,
                payment_method: 'COD',
                notes: document.getElementById('notes').value
            };

            try {
                btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Processing Transaction...';
                btn.disabled = true;

               
                const res = await apiFetch('/orders', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                if(res.success && res.orderNumber) {
                    // Success! Show Confetti/Screen
                    document.getElementById('showOrderNum').innerText = res.orderNumber;
                    document.getElementById('successScreen').style.display = 'flex';
                }
            } catch(e) {
                alert(e.message || "Failed to place order. Transaction Rolled back securely.");
                btn.innerHTML = 'Place Order Now <i class="fa fa-check"></i>';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
