<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Cartify Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../shared/css/base.css">

    <style>
        .page-header {
            background: linear-gradient(135deg, #1B365D, #2563EB);
            padding: 50px 0 40px;
            margin-bottom: 50px;
            text-align: center;
            color: white;
        }
        .page-header h1 { font-size: 2.5rem; margin-bottom: 8px; }
        .page-header p  { opacity: 0.8; font-size: 1rem; }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        .wish-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            position: relative;
        }
        .wish-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.14);
        }

        .wish-remove-btn {
            position: absolute;
            top: 12px; right: 12px;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: white;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            color: #e53935;
            font-size: 1rem;
            transition: all 0.2s;
            z-index: 5;
        }
        .wish-remove-btn:hover { background: #e53935; color: white; transform: scale(1.1); }

        .wish-img {
            height: 220px;
            background: #f8f9fa;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .wish-img img {
            width: 80%; height: 80%; object-fit: contain;
            transition: transform 0.4s ease;
        }
        .wish-card:hover .wish-img img { transform: scale(1.08); }

        .wish-info {
            padding: 20px;
        }
        .wish-category {
            font-size: 0.78rem; color: #9ca3af;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .wish-name {
            font-size: 1.05rem; font-weight: 700;
            color: #1B365D; margin-bottom: 12px;
            cursor: pointer;
        }
        .wish-name:hover { color: #2563EB; }

        .wish-price {
            margin-bottom: 16px;
        }
        .wish-price .original {
            display: block;
            text-decoration: line-through;
            color: #aaa; font-size: 0.85rem; font-weight: 400;
        }
        .wish-price .sale {
            display: block;
            color: #e53935; font-size: 1.3rem; font-weight: 900;
        }
        .wish-price .regular {
            font-size: 1.2rem; font-weight: 800; color: #1B365D;
        }

        .wish-actions {
            display: flex; gap: 10px;
        }
        .btn-add-cart {
            flex: 1; padding: 11px;
            background: #1B365D; color: white;
            border: none; border-radius: 8px;
            font-weight: 700; font-size: 0.9rem;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-add-cart:hover { background: #2563EB; }

        .empty-wishlist {
            text-align: center;
            padding: 100px 20px;
            color: #9ca3af;
        }
        .empty-wishlist i { font-size: 5rem; color: #e5e7eb; margin-bottom: 20px; }
        .empty-wishlist h2 { font-size: 1.8rem; color: #374151; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="main-header">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html" class="logo-wrapper">
                <img src="../assets/images/logo.png" alt="Cartify Logo">
            </a>
            <div id="authLinks" style="display: flex; gap: 20px; font-weight: bold; align-items: center;">
                <a href="index.html" style="color: var(--text-muted)">Home</a>
            </div>
            <div class="header-actions">
                <div class="action-icon" onclick="window.location.href='wishlist.html'" title="Wishlist" style="color:#e53935;">
                    <i class="fa fa-heart"></i>
                    <span class="cart-badge" id="wishlistCount" style="background:#e53935;">0</span>
                </div>
                <div class="action-icon" onclick="window.location.href='cart.html'" title="Cart">
                    <i class="fa fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1><i class="fa fa-heart"></i> My Wishlist</h1>
        <p id="wishlistSubtitle">Loading your saved items...</p>
    </div>

    <div class="container">
        <div class="wishlist-grid" id="wishlistGrid">
            <div style="grid-column:1/-1; text-align:center; padding:60px; color:#9ca3af;">
                <i class="fa fa-spinner fa-spin fa-3x"></i>
                <p style="margin-top:20px;">Loading wishlist...</p>
            </div>
        </div>
    </div>

    <script src="../shared/js/api.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('cartify_token');
            if (!token) {
                document.getElementById('wishlistGrid').innerHTML = `
                    <div class="empty-wishlist" style="grid-column:1/-1;">
                        <i class="fa fa-lock"></i>
                        <h2>Login Required</h2>
                        <p>Please login to view your wishlist.</p>
                        <a href="login.html" class="btn btn-primary mt-4" style="margin-top:20px;">Login Now</a>
                    </div>
                `;
                document.getElementById('wishlistSubtitle').innerText = 'Please login first';
                return;
            }
            await loadWishlist();
        });

        async function loadWishlist() {
            try {
                const res = await apiFetch('/wishlist');
                const grid = document.getElementById('wishlistGrid');
                const subtitle = document.getElementById('wishlistSubtitle');

                if (res.success && res.data.length > 0) {
                    subtitle.innerText = `${res.data.length} item${res.data.length > 1 ? 's' : ''} saved`;
                    // Update wishlist badge
                    const wBadge = document.getElementById('wishlistCount');
                    if (wBadge) wBadge.innerText = res.data.length;

                    grid.innerHTML = '';
                    res.data.forEach(item => {
                        const img = item.image
                            ? `http://localhost:5000${item.image}`
                            : 'https://placehold.co/400?text=No+Image';

                        // Effective price
                        let salePrice = null;
                        if (item.is_flash_sale && item.flash_sale_price) {
                            salePrice = item.flash_sale_price;
                        } else if (item.discount_price) {
                            salePrice = item.discount_price;
                        }

                        const priceHTML = salePrice
                            ? `<span class="original">Rs ${parseFloat(item.price).toFixed(0)}</span>
                               <span class="sale">Rs ${parseFloat(salePrice).toFixed(0)}</span>`
                            : `<span class="regular">Rs ${parseFloat(item.price).toFixed(0)}</span>`;

                        const outOfStock = item.stock < 1;

                        grid.innerHTML += `
                            <div class="wish-card">
                                <button class="wish-remove-btn" onclick="removeFromWishlist(${item.wishlist_id})" title="Remove from Wishlist">
                                    <i class="fa fa-times"></i>
                                </button>
                                <div class="wish-img" onclick="window.location.href='product.html?id=${item.product_id}'">
                                    <img src="${img}" alt="${item.name}">
                                </div>
                                <div class="wish-info">
                                    <div class="wish-name" onclick="window.location.href='product.html?id=${item.product_id}'">${item.name}</div>
                                    <div class="wish-price">${priceHTML}</div>
                                    <div class="wish-actions">
                                        <button class="btn-add-cart" onclick="addToCartFromWishlist(${item.product_id})" ${outOfStock ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>
                                            <i class="fa fa-shopping-cart"></i> ${outOfStock ? 'Out of Stock' : 'Add to Cart'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    subtitle.innerText = '0 items saved';
                    grid.innerHTML = `
                        <div class="empty-wishlist" style="grid-column:1/-1;">
                            <i class="fa fa-heart-broken"></i>
                            <h2>Your Wishlist is Empty</h2>
                            <p>Browse our store and click the ♡ heart button on any product to save it here.</p>
                            <a href="shop.html" class="btn btn-primary" style="margin-top:20px; display:inline-block;">
                                <i class="fa fa-store"></i> Browse Products
                            </a>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('wishlistGrid').innerHTML = `
                    <div class="empty-wishlist" style="grid-column:1/-1;">
                        <i class="fa fa-exclamation-triangle"></i>
                        <h2>Failed to Load Wishlist</h2>
                        <p>${e.message}</p>
                    </div>
                `;
            }
        }

        async function removeFromWishlist(wishlistId) {
            try {
                const res = await apiFetch(`/wishlist/${wishlistId}`, { method: 'DELETE' });
                if (res.success) {
                    showToast('Removed from wishlist', 'success');
                    await loadWishlist();
                    updateCartBadge();
                }
            } catch (e) {
                showToast(e.message || 'Error removing item', 'error');
            }
        }

        async function addToCartFromWishlist(productId) {
            try {
                const res = await apiFetch('/cart/add', {
                    method: 'POST',
                    body: JSON.stringify({ product_id: productId, quantity: 1 })
                });
                if (res.success) {
                    showToast('Added to cart!', 'success');
                    updateCartBadge();
                }
            } catch (e) {
                if (e.message.includes('Token') || e.message === 'Something went wrong') {
                    showToast('Please login to add to cart', 'error');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    showToast(e.message || 'Error adding to cart', 'error');
                }
            }
        }
    </script>
</body>
</html>
